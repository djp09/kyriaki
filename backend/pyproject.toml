[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "PIE", "RET", "C4"]
ignore = [
    "S101",   # assert allowed in tests
    "E501",   # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"main.py" = ["E402", "B008"]  # load_dotenv() before imports; Depends() in defaults is standard FastAPI
"test_*.py" = ["B017"]  # broad exception in pytest.raises is fine for validation tests
"run_*.py" = ["E402", "I001", "F541"]  # standalone scripts need import order flexibility
"db_models.py" = ["UP045"]  # SQLAlchemy evaluates Mapped[Optional[X]] at runtime; X | None breaks on 3.9
"alembic/*" = ["UP"]  # alembic templates use old-style typing

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["."]
markers = [
    "ollama: requires running Ollama instance with Gemma model",
    "live_claude: requires Anthropic API key for live Claude calls",
    "slow: long-running tests (full pipeline, >60s)",
]
