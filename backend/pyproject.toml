[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "PIE", "RET", "C4"]
ignore = [
    "S101",   # assert allowed in tests
    "E501",   # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"main.py" = ["E402"]  # load_dotenv() must run before imports
"test_*.py" = ["B017"]  # broad exception in pytest.raises is fine for validation tests
"alembic/*" = ["UP"]  # alembic templates use old-style typing

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["."]
