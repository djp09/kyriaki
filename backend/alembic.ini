[alembic]
script_location = alembic
# sqlalchemy.url is set programmatically in env.py from KYRIAKI_DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://kyriaki:kyriaki_dev@localhost:5432/kyriaki

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
