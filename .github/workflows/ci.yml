name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kyriaki_test
          POSTGRES_USER: kyriaki
          POSTGRES_PASSWORD: kyriaki_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kyriaki -d kyriaki_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff

      - name: Lint
        run: ruff check backend/

      - name: Format check
        run: ruff format --check backend/

      - name: Test
        working-directory: backend
        env:
          KYRIAKI_DATABASE_URL: "postgresql+asyncpg://kyriaki:kyriaki_test@localhost:5432/kyriaki_test"
          KYRIAKI_ANTHROPIC_API_KEY: "test-key-not-real"
          KYRIAKI_ENVIRONMENT: "test"
        run: pytest -v --tb=short --cov=. --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t kyriaki-backend ./backend

      - name: Build frontend image
        run: docker build -t kyriaki-frontend ./frontend

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pip audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: NPM audit
        working-directory: frontend
        run: npm audit --audit-level=high || true
